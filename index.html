<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css" />
    <meta property="og:image" content="https://bolt.new/static/og_default.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png">
</head>
  <body>
    <div class="app">
      <header class="app-header">
        <div class="header-left">
          <div class="app-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
              <polyline points="12 6 12 12 16 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h1 class="app-title">Pomodoro</h1>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
            <span class="toggle-icon toggle-sun">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
            </span>
            <span class="toggle-icon toggle-moon">
              <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </span>
          </span>
        </button>
      </header>

      <div class="mode-selector" id="modeSelector">
        <div class="mode-indicator" id="modeIndicator"></div>
        <button class="mode-btn active" data-mode="work" data-index="0">Work</button>
        <button class="mode-btn" data-mode="short" data-index="1">Short Break</button>
        <button class="mode-btn" data-mode="long" data-index="2">Long Break</button>
      </div>

      <main class="timer-section">
        <div class="timer-ring-container">
          <div class="timer-glow" id="timerGlow"></div>
          <svg class="timer-svg" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
            <circle class="ring-track" cx="120" cy="120" r="104" />
            <circle class="ring-progress" cx="120" cy="120" r="104" id="progressRing" />
          </svg>
          <div class="timer-inner">
            <span class="time-display" id="timeDisplay">25:00</span>
            <span class="timer-label" id="timerLabel">Focus Time</span>
          </div>
        </div>

        <div class="controls">
          <button class="ctrl-btn secondary" id="resetBtn" aria-label="Reset">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 .49-4.51"></path></svg>
          </button>
          <button class="ctrl-btn primary" id="startBtn">Start</button>
          <button class="ctrl-btn secondary" id="skipBtn" aria-label="Skip">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
          </button>
        </div>

        <div class="sessions-row">
          <span class="sessions-label">Sessions today</span>
          <div class="session-dots" id="sessionDots"></div>
        </div>
      </main>

      <section class="settings-card">
        <h2 class="settings-title">Timer Settings</h2>
        <div class="settings-list">
          <div class="setting-item">
            <div class="setting-left">
              <span class="setting-label">Work</span>
              <span class="setting-unit">minutes</span>
            </div>
            <div class="stepper">
              <button class="step-btn" data-target="work" data-action="dec" aria-label="Decrease work time">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              </button>
              <span class="step-value" id="workMinutes">25</span>
              <button class="step-btn" data-target="work" data-action="inc" aria-label="Increase work time">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              </button>
            </div>
          </div>
          <div class="setting-divider"></div>
          <div class="setting-item">
            <div class="setting-left">
              <span class="setting-label">Short Break</span>
              <span class="setting-unit">minutes</span>
            </div>
            <div class="stepper">
              <button class="step-btn" data-target="short" data-action="dec" aria-label="Decrease short break">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              </button>
              <span class="step-value" id="shortMinutes">5</span>
              <button class="step-btn" data-target="short" data-action="inc" aria-label="Increase short break">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              </button>
            </div>
          </div>
          <div class="setting-divider"></div>
          <div class="setting-item">
            <div class="setting-left">
              <span class="setting-label">Long Break</span>
              <span class="setting-unit">minutes</span>
            </div>
            <div class="stepper">
              <button class="step-btn" data-target="long" data-action="dec" aria-label="Decrease long break">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              </button>
              <span class="step-value" id="longMinutes">15</span>
              <button class="step-btn" data-target="long" data-action="inc" aria-label="Increase long break">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              </button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <div class="completion-toast" id="completionToast">
      <div class="toast-icon" id="toastIcon"></div>
      <div class="toast-text">
        <strong id="toastTitle">Session Complete!</strong>
        <span id="toastSub">Time for a break</span>
      </div>
    </div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
